<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#123f35" />
  <meta name="description" content="A colorful, touch-friendly single-hole mini-golf game built with Matter.js." />
  <title>Meadow Putt</title>

  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.4/dist/confetti.browser.min.js"></script>
  <link rel="stylesheet" href="styles.css" />
  <style>
    #instructions {
      top: 50%;
      bottom: auto;
      transform: translate(-50%, -50%);
      width: min(86vw, 440px);
    }

    #instructions.hidden {
      transform: translate(-50%, calc(-50% + 14px));
    }

    #helpButton.instructions-open {
      animation: help-pulse 1.8s ease-in-out infinite;
    }

    @keyframes help-pulse {
      0%, 100% {
        transform: scale(1);
        background: rgba(255, 255, 255, 0.09);
        box-shadow: inset 0 1px rgba(255, 255, 255, 0.08), 0 0 0 0 rgba(255, 220, 91, 0);
      }
      50% {
        transform: scale(1.09);
        background: rgba(255, 220, 91, 0.22);
        box-shadow: inset 0 1px rgba(255, 255, 255, 0.16), 0 0 0 9px rgba(255, 220, 91, 0.12);
      }
    }

    #finishModal {
      overflow-y: auto;
      padding-top: max(18px, env(safe-area-inset-top));
      padding-bottom: max(18px, env(safe-area-inset-bottom));
    }

    #finishModal .congrats-card {
      width: min(92vw, 520px);
      padding: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
      overflow: visible;
    }

    .congrats-art {
      position: relative;
      z-index: 2;
      display: block;
      width: min(100%, 460px);
      max-height: min(50dvh, 480px);
      margin: 0 auto -14px;
      object-fit: contain;
      filter: drop-shadow(0 20px 28px rgba(0, 0, 0, 0.38));
      transform-origin: 50% 100%;
    }

    .congrats-copy {
      position: relative;
      z-index: 1;
      padding: 24px 26px 28px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 26px;
      background: linear-gradient(155deg, rgba(30, 106, 82, 0.98), rgba(12, 53, 43, 0.98));
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.38), inset 0 1px rgba(255, 255, 255, 0.08);
    }

    #finishModal.show .congrats-art {
      animation: congrats-pop 560ms cubic-bezier(.18, .88, .28, 1.18) both;
    }

    @keyframes congrats-pop {
      0% { opacity: 0; transform: translateY(24px) scale(0.78) rotate(-2deg); }
      70% { opacity: 1; transform: translateY(-5px) scale(1.04) rotate(1deg); }
      100% { opacity: 1; transform: translateY(0) scale(1) rotate(0); }
    }

    @media (max-width: 520px) {
      #instructions {
        width: min(88vw, 390px);
        padding: 16px 18px;
      }

      .congrats-art {
        max-height: 43dvh;
        margin-bottom: -10px;
      }

      .congrats-copy {
        padding: 20px 20px 24px;
        border-radius: 22px;
      }

      .congrats-copy h1 {
        font-size: clamp(30px, 10vw, 42px);
      }

      .congrats-copy p {
        margin: 12px 0 18px;
        font-size: 15px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      #helpButton.instructions-open {
        animation: none;
        background: rgba(255, 220, 91, 0.22);
        outline: 2px solid rgba(255, 220, 91, 0.6);
      }
    }
  </style>
</head>
<body>
  <main id="app" aria-label="Meadow Putt mini-golf game">
    <canvas id="gameCanvas" aria-label="Mini-golf course"></canvas>

    <section class="hud" aria-label="Game score">
      <div class="score-card">
        <div class="stat">
          <span class="stat-label">Holes</span>
          <span class="stat-value"><span id="holesValue">0</span>/<span id="goalValue">5</span></span>
        </div>
        <div class="stat">
          <span class="stat-label">This hole</span>
          <span class="stat-value" id="shotsValue">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Total</span>
          <span class="stat-value" id="totalValue">0</span>
        </div>
      </div>

      <div class="hud-actions">
        <button class="icon-button" id="helpButton" type="button" aria-label="Hide instructions">?</button>
        <button class="icon-button" id="soundButton" type="button" aria-label="Toggle sound" title="Sound (M)">♪</button>
        <button class="icon-button" id="recoverButton" type="button" aria-label="Return ball to previous position with one penalty stroke" title="Recover ball (+1)">↶</button>
        <button class="icon-button" id="restartButton" type="button" aria-label="Restart course" title="Restart course (R)">↻</button>
      </div>
    </section>

    <aside id="instructions">
      <strong>Pull back, then release</strong>
      <span>Start on the glowing ball. Drag opposite the shot direction. Longer means stronger. Tap the pulsing ? to close this card.</span>
    </aside>

    <div id="toast" role="status" aria-live="polite">Nice!</div>

    <section class="modal" id="finishModal" role="dialog" aria-modal="true" aria-labelledby="finishTitle">
      <div class="modal-card congrats-card">
        <img class="congrats-art" src="golf-congrats.png" alt="A golfer celebrating completion of the course" />
        <div class="congrats-copy">
          <p class="modal-kicker">All five holes complete</p>
          <h1 id="finishTitle">Congratulations!</h1>
          <p id="resultSummary">You completed the course in <strong id="finalScore">0</strong> total shots.</p>
          <button class="primary-button" id="playAgainButton" type="button">Play again</button>
        </div>
      </div>
    </section>
  </main>

  <script defer src="js/setup.js"></script>
  <script defer src="js/physics.js"></script>
  <script defer src="js/ui.js"></script>
  <script defer src="js/render.js"></script>
  <script defer src="js/main.js"></script>
</body>
</html>
